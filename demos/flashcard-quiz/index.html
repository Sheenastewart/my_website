<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcard Quiz App</title>
  <link rel="stylesheet" href="../demo-nav.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="has-demo-nav">
  <nav class="demo-nav">
    <a href="../../#projects" class="demo-nav-back">← Portfolio</a>
  </nav>
  <main class="demo-content">
  <div class="app">
    <h1 class="title">👩🏽‍💻 Sheena's Flashcard Quiz</h1>
    
    <div class="flashcard-container">
      <div class="flashcard" id="flashcard">
        <div class="front" id="card-front">Question</div>
        <div class="back" id="card-back">Answer</div>
      </div>
    </div>

	<p id="cardProgress" class="progress-indicator">Card 1 of 10</p>


    <div class="controls">
  <button id="backBtn">Back</button>
  <button id="flipBtn">Flip</button>
  <button id="nextBtn">Next</button>
</div>

  </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
