<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💖 Tic-Tac-Toe 🖤</title>
  <link rel="stylesheet" href="../demo-nav.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="has-demo-nav">
  <nav class="demo-nav">
    <a href="../../#projects" class="demo-nav-back">← Portfolio</a>
  </nav>
  <main class="demo-content">
  <div class="container">
    <h1>💖 Tic-Tac-Toe 🖤</h1>

   <div class="scoreboard" id="scoreboard">
  <span id="scoreLabelLight">Player 1 (💖):</span>
  <span id="scoreLight">0</span>
  <span> — </span>
  <span id="scoreLabelDark">Computer (🖤):</span>
  <span id="scoreDark">0</span>
</div>

<p class="mode-label" id="modeLabel">Mode: 1 Player (You vs Computer)</p>


    <div class="game-board" id="board">
      <div class="cell" data-cell></div>
      <div class="cell" data-cell></div>
      <div class="cell" data-cell></div>
      <div class="cell" data-cell></div>
      <div class="cell" data-cell></div>
      <div class="cell" data-cell></div>
      <div class="cell" data-cell></div>
      <div class="cell" data-cell></div>
      <div class="cell" data-cell></div>
    </div>

    <div class="message" id="message">Your turn (💖)</div>

    <div class="buttons">
      <button id="resetBtn">Reset Game</button>
      <button id="modeToggle">Switch to 2 Player Mode</button>
      <button id="resetScores">Reset Scores</button>
    </div>
  </div>
  </main>

  <script src="script.js?v=2"></script>
</body>
</html>
