<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guess the Number</title>
  <link rel="stylesheet" href="../demo-nav.css?v=2" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body class="has-demo-nav">
  <nav class="demo-nav">
    <div class="demo-nav-inner">
      <a href="../../#projects" class="demo-nav-back">← Portfolio</a>
    </div>
  </nav>
  <main class="demo-content">
  <div class="container">
   <div class="ribbon">🎀</div>
<h1>Guess My Favorite Number</h1>
<p class="subtitle">Hint: It’s between 1 and 10 😉</p>
    <input type="number" id="guessInput" min="1" max="10" />
    <button id="guessButton">Guess</button>
    <div class="message" id="message"></div>
    <div class="attempts" id="attempts"></div>
    <button id="resetButton">Play Again</button>
  </div>
  </main>

  <script src="../embed.js"></script>
  <script src="script.js"></script>
</body>
</html>
